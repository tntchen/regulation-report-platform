services:
  app:
    image: chentnt/regulation-report-platform:latest
    container_name: regulation-platform
    ports:
      - "8080:8080"
    volumes:
      - app_data:/app/data
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_POLL_INTERVAL: 300
      WATCHTOWER_CLEANUP: "true"
    command: regulation-platform
    restart: unless-stopped

volumes:
  app_data:
